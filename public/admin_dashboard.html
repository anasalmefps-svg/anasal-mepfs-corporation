<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Anasal MEPFS Corp - Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #c4161c;
    --primary-dark: #9a1116;
    --dark: #1a1a1a;
    --dark-lighter: #2a2a2a;
    --light: #f5f5f5;
    --steel: #666666;
    --steel-light: #888888;
    --white: #ffffff;
}

body{
    margin:0;
    font-family: 'Roboto', sans-serif;
    background: var(--light);
    color: var(--dark);
}

/* Header */
.header{
    background: var(--dark);
    color: var(--white);
    padding: 0 20px;
    height: 60px;
    display: flex;
    align-items: center;
    border-bottom: 4px solid var(--primary);
    justify-content: space-between;
}

.header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.header-logo .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 20px;
}

.header-title {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 18px;
}

.header-title span {
    color: var(--steel-light);
    font-size: 12px;
    display: block;
    letter-spacing: 0.1em;
}

.container{
    display:flex;
    height:calc(100vh - 64px);
}

/* Sidebar */
.sidebar{
    width:240px;
    background: var(--dark-lighter);
    color: var(--white);
    overflow-y: auto;
    border-right: 1px solid #333;
}

.sidebar h3{
    font-family: 'Oswald', sans-serif;
    padding: 18px 20px;
    margin:0;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 14px;
    color: var(--steel-light);
    border-bottom: 1px solid #444;
}

.table-item{
    padding: 14px 20px;
    cursor:pointer;
    border-bottom: 1px solid #333;
    font-size: 14px;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
}

.table-item::before {
    content: '';
    width: 4px;
    height: 0;
    background: var(--primary);
    transition: height 0.2s ease;
    position: absolute;
    left: 0;
}

.table-item:hover{
    background: var(--dark);
    color: var(--white);
    position: relative;
}

.table-item:hover::before {
    height: 100%;
}

.table-item.active {
    background: var(--primary);
    color: white;
}

/* Main Content */
.main{
    flex:1;
    padding: 25px;
    overflow:auto;
    background: #eef0f2;
}

h3 {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    margin-bottom: 20px;
    letter-spacing: 0.05em;
    color: var(--dark);
    border-left: 4px solid var(--primary);
    padding-left: 12px;
}

/* Table Styling */
table{
    border-collapse:collapse;
    width:100%;
    background: var(--white);
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

th, td{
    border:1px solid #e0e0e0;
    padding: 12px 15px;
    font-size:14px;
    vertical-align: middle;
}

th{
    background: var(--dark);
    color: var(--white);
    text-align: left;
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    text-transform: uppercase;
    font-size: 13px;
    letter-spacing: 0.05em;
}

tr:nth-child(even) {
    background-color: #fafafa;
}

tr:hover {
    background-color: #f0f0f0;
}

.empty{
    color: var(--steel);
    margin-top: 50px;
    text-align: center;
    font-style: italic;
}

/* Buttons & Form Elements */
.action-btn{
    padding: 6px 14px;
    font-size: 11px;
    font-family: 'Oswald', sans-serif;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border: none;
    transition: all 0.2s ease;
    font-weight: 500;
}

.action-btn.save {
    background: var(--primary);
    color: white;
}

.action-btn.save:hover {
    background: var(--primary-dark);
}

.action-btn.delete {
    background: transparent;
    color: var(--primary);
    border: 1px solid var(--primary);
}

.action-btn.delete:hover {
    background: var(--primary);
    color: white;
}

.form-box{
    background: var(--white);
    padding: 20px;
    margin-bottom: 20px;
    border-top: 3px solid var(--primary);
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.form-box b {
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
    color: var(--dark);
}

.form-box input[type="text"],
.form-box input[type="email"],
.form-box input[type="tel"],
.form-box input[type="number"],
.form-box input[type="file"],
.form-box textarea,
.form-box select {
    margin: 5px 5px 5px 0;
    padding: 8px 12px;
    border: 1px solid #ccc;
    font-family: 'Roboto', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s;
}

.form-box input:focus,
.form-box textarea:focus,
.form-box select:focus {
    border-color: var(--primary);
    outline: none;
}

.form-box input[type="file"] {
    background: white;
    padding: 5px;
}

.preview-img{
    max-width: 100px;
    max-height: 70px;
    display:block;
    margin-bottom: 6px;
    border: 1px solid #ddd;
    object-fit: cover;
}

/* Scrollbar */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: var(--light);
}

::-webkit-scrollbar-thumb {
    background: var(--steel);
}

::-webkit-scrollbar-thumb:hover {
    background: var(--primary);
}
</style>
</head>

<body>

<div class="header">
    <div class="header-logo">
        <div class="logo-icon">A</div>
        <div class="header-title">
            Anasal MEPFS
            <span>Admin Dashboard</span>
        </div>
    </div>
</div>

<div class="container">

    <div class="sidebar">
        <h3>Database Tables</h3>
        <div id="tables"></div>
    </div>

    <div class="main">
        <div id="content" class="empty">
            Select a table from the sidebar to manage data.
        </div>
    </div>

</div>

<script>
const tablesDiv = document.getElementById("tables");
const content   = document.getElementById("content");

let currentTable = "";
let idField = "";
let currentCols = [];
let currentRows = [];

/* ---------------- tables list ---------------- */

async function loadTables(){

    const res = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/tables");
    const tables = await res.json();

    tablesDiv.innerHTML = "";

    tables.forEach(t => {
        const div = document.createElement("div");
        div.className = "table-item";
        div.textContent = t.replace(/_/g, ' '); // Prettify name
        div.setAttribute("data-table", t);
        div.onclick = () => {
            // Highlight active
            document.querySelectorAll('.table-item').forEach(i => i.classList.remove('active'));
            div.classList.add('active');
            loadTableData(t);
        };
        tablesDiv.appendChild(div);
    });
}

/* ---------------- load table ---------------- */

async function loadTableData(table){

    currentTable = table;
    content.innerHTML = "Loading data...";

    const res = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/table/" + table);
    const rows = await res.json();

    if(!Array.isArray(rows) || rows.length === 0){
        content.innerHTML = "<h3>" + table.replace(/_/g, ' ') + "</h3><div class='empty'>No data available in this table.</div>";
        return;
    }

    currentRows = rows;
    currentCols = Object.keys(rows[0]);
    idField = currentCols[0];

    let html = `<h3>${table.replace(/_/g, ' ')}</h3>`;

    /* ---------- add form ---------- */

    html += `<div class="form-box"><b>Add New Entry</b><br>`;

    currentCols.forEach(c=>{
        if(c === idField) return;

        if(c === "image_url" || c === "photo_url" || c.includes("image") || c.includes("photo")){
            html += `<input type="file" id="new_${c}" title="${c}">`;
        } else if (c.includes("description") || c.includes("message") || c.includes("content")) {
            html += `<textarea id="new_${c}" placeholder="${c}" rows="3" style="width:90%;vertical-align:top;"></textarea>`;
        } else {
            html += `<input type="text" id="new_${c}" placeholder="${c}">`;
        }
    });

    html += `<button class="action-btn save" onclick="addRow()">Add Entry</button></div>`;

    /* ---------- table ---------- */

    html += `<table><thead><tr>`;

    currentCols.forEach(c=>{
        html += `<th>${c.replace(/_/g, ' ')}</th>`;
    });

    html += `<th style="width: 140px;">Actions</th></tr></thead><tbody>`;

    rows.forEach((r, rowIndex)=>{

        html += `<tr data-row-index="${rowIndex}">`;

        currentCols.forEach(c=>{

            if(c === idField){

                html += `<td><strong>${r[c] ?? ""}</strong></td>`;

            }else if(c === "image_url" || c === "photo_url" || c.includes("image") || c.includes("photo")){

                html += `
                    <td data-col="${c}">
                        ${r[c] ? `<img src="${r[c]}" class="preview-img" alt="preview">` : ""}
                        <input type="file" style="font-size:12px;">
                    </td>
                `;

            }else{

                // Truncate long text in table cells for cleaner look
                let displayText = r[c] ?? "";
                if(displayText.length > 100) displayText = displayText.substring(0, 100) + "...";
                
                html += `<td contenteditable="true" data-col="${c}">${displayText}</td>`;
            }

        });

        html += `
            <td style="text-align:center;">
                <button class="action-btn save" onclick="updateRow(${rowIndex})">Save</button>
                <button class="action-btn delete" onclick="deleteRow('${r[idField]}')">Delete</button>
            </td>
        `;

        html += `</tr>`;
    });

    html += `</tbody></table>`;

    content.innerHTML = html;
}
/* ------------ upload ------------ */
async function uploadImage(file){

    const formData = new FormData();
    formData.append("image", file);

    const res = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/upload",{
        method:"POST",
        body: formData
    });

    const result = await res.json();

    if(!result.success){
        alert("Image upload failed");
        throw new Error("Upload failed");
    }

    return result.url;
}
/* ---------------- add ---------------- */

async function addRow(){

    const data = {};

    for(const c of currentCols){

        if(c === idField) continue;

        if(c === "image_url" || c === "photo_url" || c.includes("image") || c.includes("photo")){

            const file = document.getElementById("new_" + c).files[0];

            if(file){
                data[c] = await uploadImage(file);
            }else{
                data[c] = "";
            }

        }else{

            data[c] = document.getElementById("new_" + c).value;

        }
    }

    const res = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/table/" + currentTable,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify(data)
    });

    if(!res.ok){
        alert("Insert failed.");
        return;
    }

    loadTableData(currentTable);
}

/* ---------------- update ---------------- */

async function updateRow(rowIndex){

    const row = currentRows[rowIndex];
    const id  = row[idField];

    const tr = content.querySelector(`tr[data-row-index="${rowIndex}"]`);

    const data = {};

    const cells = tr.querySelectorAll("td[data-col]");

    for(const td of cells){

        const col = td.dataset.col;

        if(col === "image_url" || col === "photo_url" || col.includes("image") || col.includes("photo")){

            const fileInput = td.querySelector("input[type=file]");
            const file = fileInput ? fileInput.files[0] : null;

            if(file){

                const formData = new FormData();
                formData.append("image", file);

                const uploadRes = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/upload", {
                    method: "POST",
                    body: formData
                });

                const uploadData = await uploadRes.json();

                if(uploadData.success){
                    data[col] = uploadData.path;
                }else{
                    alert("Image upload failed");
                    return;
                }

            }else{

                const img = td.querySelector("img");
                data[col] = img ? img.getAttribute("src") : "";

            }

        }else{

            data[col] = td.textContent.trim();

        }

    }

    const res = await fetch(`https://anasal-mepfs-corporation.onrender.com/api/admin/table/${currentTable}/${idField}/${id}`,{
        method:"PUT",
        headers:{ "Content-Type": "application/json" },
        body:JSON.stringify(data)
    });

    if(!res.ok){
        alert("Update failed.");
        return;
    }

    loadTableData(currentTable);
}

/* ---------------- delete ---------------- */

async function deleteRow(id){

    if(!confirm("Are you sure you want to delete this record?")) return;

    const res = await fetch(`https://anasal-mepfs-corporation.onrender.com/api/admin/table/${currentTable}/${idField}/${id}`,{
        method:"DELETE"
    });

    if(!res.ok){
        alert("Delete failed.");
        return;
    }

    loadTableData(currentTable);
}

loadTables();
</script>
</body>
</html>
