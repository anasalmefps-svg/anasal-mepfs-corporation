<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anasal MEPFS Corp - Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #c4161c;
    --primary-dark: #9a1116;
    --dark: #1a1a1a;
    --dark-lighter: #2a2a2a;
    --light: #f5f5f5;
    --steel: #666666;
    --steel-light: #888888;
    --white: #ffffff;
    --sidebar-w: 250px;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Roboto', sans-serif;
    background: var(--dark);
    color: var(--dark);
    overflow-x: hidden;
}

/* ==================== LOGIN SCREEN ==================== */
.login-container {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--dark);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 20px;
}

.login-box {
    width: 100%;
    max-width: 420px;
    background: var(--white);
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.login-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: var(--primary);
}

.login-header {
    background: var(--dark-lighter);
    padding: 30px 24px;
    text-align: center;
}

.login-header h2 {
    color: var(--white);
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    text-transform: uppercase;
}

.login-body {
    padding: 30px 24px 36px;
}

.login-body input {
    width: 100%;
    padding: 15px 16px;
    margin-bottom: 16px;
    border: 2px solid #e0e0e0;
    font-size: 16px;
    font-family: 'Roboto', sans-serif;
    transition: border-color 0.3s ease;
    background: var(--white);
    border-radius: 2px;
}

.login-body input:focus {
    outline: none;
    border-color: var(--primary);
}

.login-body button {
    width: 100%;
    padding: 15px;
    background: var(--primary);
    border: none;
    color: var(--white);
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    font-size: 16px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: background 0.3s ease;
    border-radius: 2px;
}

.login-body button:hover {
    background: var(--primary-dark);
}

#errorMsg {
    text-align: center;
    margin-top: 16px;
    font-size: 14px;
    padding: 12px;
    background: var(--light);
    color: var(--steel);
    display: none;
    border-radius: 2px;
}

/* ==================== DASHBOARD ==================== */
#appContainer {
    display: none;
    height: 100vh;
}

/* ---------- HEADER ---------- */
.header {
    background: var(--dark);
    color: var(--white);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    border-bottom: 4px solid var(--primary);
}

.header-left {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
}

.header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
}

.header-logo .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 16px;
    flex-shrink: 0;
}

.header-title {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 16px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.header-title span {
    color: var(--steel-light);
    font-size: 11px;
    display: block;
    letter-spacing: 0.1em;
    font-weight: 400;
}

.header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
}

.logout-btn {
    background: transparent;
    color: var(--white);
    border: 1px solid var(--primary);
    padding: 7px 16px;
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
    white-space: nowrap;
}

.logout-btn:hover {
    background: var(--primary);
}

/* ========================================
   HAMBURGER
   ======================================== */
.hamburger-btn {
    display: none;
    width: 40px;
    height: 40px;
    cursor: pointer;
    background: none;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 0;
    z-index: 300;
    flex-shrink: 0;
    position: relative;
    transition: border-color 0.3s ease, background 0.3s ease;
}

.hamburger-btn:hover {
    border-color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.05);
}

.hamburger-btn span {
    display: block;
    width: 18px;
    height: 2px;
    background-color: var(--white);
    border-radius: 2px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    transition: all 0.35s cubic-bezier(0.77, 0, 0.175, 1);
}

.hamburger-btn span:nth-child(1) { top: 13px; }
.hamburger-btn span:nth-child(2) { top: 19px; }
.hamburger-btn span:nth-child(3) { top: 25px; }

.hamburger-btn.active {
    border-color: var(--primary);
    background: rgba(196, 22, 28, 0.15);
}

.hamburger-btn.active span:nth-child(1) {
    top: 19px;
    transform: translateX(-50%) rotate(45deg);
    background-color: var(--primary);
}

.hamburger-btn.active span:nth-child(2) {
    opacity: 0;
    transform: translateX(-50%) scaleX(0);
}

.hamburger-btn.active span:nth-child(3) {
    top: 19px;
    transform: translateX(-50%) rotate(-45deg);
    background-color: var(--primary);
}

/* ---------- SIDEBAR OVERLAY ---------- */
.sidebar-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 140;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.sidebar-overlay.active {
    pointer-events: auto;
    opacity: 1;
}

/* ---------- LAYOUT ---------- */
.container {
    display: flex;
    height: calc(100vh - 60px);
    margin-top: 60px;
}

/* ---------- SIDEBAR ---------- */
.sidebar {
    width: var(--sidebar-w);
    background: var(--dark-lighter);
    color: var(--white);
    overflow-y: auto;
    border-right: 1px solid #333;
    flex-shrink: 0;
}

.sidebar h3 {
    font-family: 'Oswald', sans-serif;
    padding: 18px 20px;
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 12px;
    color: var(--steel-light);
    border-bottom: 1px solid #444;
    background: var(--dark);
    position: sticky;
    top: 0;
    z-index: 1;
}

.table-item {
    padding: 13px 20px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 14px;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    color: #aaa;
}

.table-item::before {
    content: '';
    width: 3px;
    height: 0;
    background: var(--primary);
    transition: height 0.25s ease;
    position: absolute;
    left: 0;
    top: 0;
}

.table-item:hover {
    background: var(--dark);
    color: var(--white);
}

.table-item:hover::before {
    height: 100%;
}

.table-item.active {
    background: var(--primary);
    color: white;
}

.table-item.active::before {
    height: 100%;
    background: var(--primary-dark);
}

/* ========================================
   MAIN SECTION — NEW DESIGN
   ======================================== */
.main {
    flex: 1;
    padding: 1px;
    overflow: auto;
    background: #eef0f2;
    min-width: 0;
}

.main h3 {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    margin-bottom: 22px;
    letter-spacing: 0.06em;
    color: var(--dark);
    border-left: none;
    padding-left: 0;
    font-size: 20px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
}

.main h3::before {
    content: '';
    width: 4px;
    height: 22px;
    background: var(--primary);
    border-radius: 2px;
    flex-shrink: 0;
}

/* ---------- TABLE — CLEAN STYLE ---------- */
.table-wrapper {
    overflow-x: auto;
    border-radius: 6px;
    border: 1px solid #e2e5e9;
    background: var(--white);
    -webkit-overflow-scrolling: touch;
}

table {
    border-collapse: collapse;
    width: 100%;
    background: var(--white);
    min-width: 580px;
}

th, td {
    border: none;
    border-bottom: 1px solid #ebeef2;
    padding: 11px 13px;
    font-size: 13px;
    vertical-align: middle;
}

th {
    background: #f7f8fa;
    color: #444;
    text-align: left;
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.06em;
    white-space: nowrap;
    border-bottom: 1px solid #dde0e5;
}

tr:nth-child(even) {
    background-color: transparent;
}

tr:hover {
    background-color: #f9fafb;
}

.empty {
    color: var(--steel);
    margin-top: 20px;
    text-align: center;
    font-style: italic;
}

/* ---------- BUTTONS — REFINED ---------- */
.action-btn {
    padding: 7px 13px;
    font-size: 11px;
    font-family: 'Oswald', sans-serif;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border: none;
    transition: all 0.2s ease;
    font-weight: 500;
    white-space: nowrap;
    border-radius: 4px;
}

.action-btn.save {
    background: var(--primary);
    color: white;
    margin-right: 5px;
}

.action-btn.save:hover {
    background: var(--primary-dark);
}

.action-btn.delete {
    background: transparent;
    color: var(--steel);
    border: 1px solid #d0d3d8;
}

.action-btn.delete:hover {
    border-color: var(--primary);
    color: var(--primary);
}

/* ========================================
   FORM BOX — NEW DESIGN
   ======================================== */
.form-box {
    background: var(--white);
    padding: 0;
    margin-bottom: 24px;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #e2e5e9;
}

.form-box-header {
    background: var(--white);
    padding: 14px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #ebeef2;
}

.form-box-header b {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--dark);
    font-weight: 500;
}

.form-box-header .form-header-line {
    width: 8px;
    height: 8px;
    background: var(--primary);
    border-radius: 50%;
}

.form-box-body {
    padding: 24px 22px 22px;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px 22px;
}

.form-grid .full-width {
    grid-column: 1 / -1;
}

.form-field {
    display: flex;
    flex-direction: column;
}

.form-field label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--steel);
    margin-bottom: 7px;
    font-weight: 500;
}

.form-field input[type="text"],
.form-field input[type="email"],
.form-field input[type="tel"],
.form-field input[type="number"],
.form-field textarea,
.form-field select {
    padding: 10px 14px;
    border: 1px solid #dde0e5;
    border-bottom: 2px solid #c8ccd3;
    font-family: 'Roboto', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s ease;
    width: 100%;
    background: #fafbfc;
    border-radius: 4px 4px 0 0;
    color: var(--dark);
}

.form-field input:focus,
.form-field textarea:focus,
.form-field select:focus {
    border-color: var(--primary);
    border-bottom-color: var(--primary);
    outline: none;
    background: var(--white);
}

.form-field input[type="file"] {
    padding: 9px 6px;
    border: 1px dashed #c8ccd3;
    cursor: pointer;
    border-radius: 4px;
    font-size: 13px;
    background: #fafbfc;
    transition: border-color 0.2s ease;
}

.form-field input[type="file"]:hover {
    border-color: var(--primary);
}

.form-field textarea {
    resize: vertical;
    min-height: 80px;
    border-radius: 4px;
}

.form-box-footer {
    padding: 0 22px 22px;
    display: flex;
    justify-content: flex-end;
}

.form-box-footer .action-btn {
    padding: 10px 32px;
    font-size: 13px;
    letter-spacing: 0.08em;
}

.preview-img {
    max-width: 80px;
    max-height: 60px;
    display: block;
    margin-bottom: 5px;
    border: 1px solid #e2e5e9;
    object-fit: cover;
    border-radius: 4px;
}

td[contenteditable="true"] {
    cursor: text;
    transition: background 0.15s ease;
}

td[contenteditable="true"]:focus {
    outline: none;
    background: #fff;
    box-shadow: inset 0 -2px 0 var(--primary);
}

.cell-file-input {
    font-size: 11px;
    margin-top: 3px;
    display: block;
}

/* ---------- SCROLLBAR ---------- */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--light); }
::-webkit-scrollbar-thumb { background: #bbb; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

/* ==================== RESPONSIVE ==================== */
@media (max-width: 768px) {
    .hamburger-btn {
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .sidebar {
        position: fixed;
        top: 60px;
        left: 0;
        bottom: 0;
        width: 260px;
        max-width: 80vw;
        transform: translateX(-100%);
        visibility: hidden;
        z-index: 150;
        box-shadow: none;
        transition: transform 0.3s ease, visibility 0s linear 0.3s, box-shadow 0.3s ease;
    }

    .sidebar.open {
        transform: translateX(0);
        visibility: visible;
        box-shadow: 8px 0 40px rgba(0,0,0,0.6);
        transition: transform 0.3s ease, visibility 0s linear 0s, box-shadow 0.3s ease;
    }

    .main {
        padding: 0px 1px;
    }

    .main h3 {
        font-size: 17px;
        margin-bottom: 16px;
    }

    .form-grid {
        grid-template-columns: 1fr;
        gap: 14px;
    }

    .form-box-body {
        padding: 18px 16px 16px;
    }

    .form-box-header {
        padding: 12px 16px;
    }

    .form-box-footer {
        padding: 0 16px 16px;
    }

    .form-box-footer .action-btn {
        width: 100%;
        text-align: center;
        padding: 12px;
        font-size: 14px;
    }

    .action-btn {
        padding: 6px 10px;
        font-size: 10px;
    }

    .header {
        padding: 0 14px;
    }

    .header-title {
        font-size: 14px;
    }

    .header-title span {
        display: none;
    }

    .logout-btn {
        padding: 6px 12px;
        font-size: 11px;
        letter-spacing: 0.5px;
    }
}

@media (max-width: 480px) {
    .header-logo .logo-icon {
        width: 30px;
        height: 30px;
        font-size: 13px;
    }

    .header-title {
        font-size: 12px;
        letter-spacing: 0.02em;
    }

    .logout-btn {
        padding: 5px 8px;
        font-size: 10px;
        letter-spacing: 0;
    }

    .hamburger-btn {
        width: 36px;
        height: 36px;
        border-radius: 5px;
    }

    .hamburger-btn span {
        width: 16px;
    }

    .hamburger-btn span:nth-child(1) { top: 11px; }
    .hamburger-btn span:nth-child(2) { top: 17px; }
    .hamburger-btn span:nth-child(3) { top: 23px; }

    .hamburger-btn.active span:nth-child(1),
    .hamburger-btn.active span:nth-child(3) {
        top: 17px;
    }

    .main {
        padding: 14px 10px;
    }

    .form-box-body {
        padding: 14px 12px 12px;
    }

    .form-box-header {
        padding: 10px 12px;
    }

    .form-box-header b {
        font-size: 13px;
    }

    .form-box-footer {
        padding: 0 12px 12px;
    }

    .login-header {
        padding: 24px 18px;
    }

    .login-header h2 {
        font-size: 18px;
        letter-spacing: 3px;
    }

    .login-body {
        padding: 24px 18px 30px;
    }

    .login-body input {
        padding: 14px 14px;
        font-size: 16px;
        margin-bottom: 14px;
    }

    .login-body button {
        padding: 14px;
        font-size: 15px;
    }

    #errorMsg {
        font-size: 13px;
        margin-top: 14px;
    }

    th, td {
        padding: 9px 8px;
        font-size: 11px;
    }

    .preview-img {
        max-width: 60px;
        max-height: 45px;
    }

    .table-item {
        padding: 12px 18px;
        font-size: 13px;
    }
}
</style>
</head>
<body>

<!-- LOGIN CONTAINER -->
<div class="login-container" id="loginContainer">
    <div class="login-box">
        <div class="login-header">
            <h2>Admin Login</h2>
        </div>
        <div class="login-body">
            <form id="adminForm">
                <input type="text" id="username" placeholder="Username" required autocomplete="username">
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                <button type="submit">Login</button>
            </form>
            <div id="errorMsg"></div>
        </div>
    </div>
</div>

<!-- APP CONTAINER -->
<div id="appContainer">

    <div class="header">
        <div class="header-left">
            <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="header-logo">
                <div class="logo-icon">AMC</div>
                <div class="header-title">
                    Anasal MEPFS
                    <span>Admin Dashboard</span>
                </div>
            </div>
        </div>
        <div class="header-right">
            <button class="logout-btn" onclick="logout()">Log Out</button>
        </div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="container">
        <div class="sidebar" id="sidebar">
            <h3>Database Tables</h3>
            <div id="tables"></div>
        </div>
        <div class="main">
            <div id="content" class="empty">
                Select a table from the sidebar to manage data.
            </div>
        </div>
    </div>

</div>

<script>
const tablesDiv = document.getElementById("tables");
const content = document.getElementById("content");
const loginContainer = document.getElementById("loginContainer");
const appContainer = document.getElementById("appContainer");
const sidebar = document.getElementById("sidebar");
const sidebarOverlay = document.getElementById("sidebarOverlay");
const hamburgerBtn = document.getElementById("hamburgerBtn");

let currentTable = "";
let idField = "";
let currentCols = [];
let currentRows = [];
let sidebarOpen = false;

if (sessionStorage.getItem('adminLoggedIn') === 'true') {
    showDashboard();
}

/* ========== SIDEBAR TOGGLE ========== */
hamburgerBtn.addEventListener("click", function(e) {
    e.stopPropagation();
    if (sidebarOpen) { closeSidebar(); } else { openSidebar(); }
});

sidebarOverlay.addEventListener("click", function() { closeSidebar(); });
sidebar.addEventListener("click", function(e) { e.stopPropagation(); });

function openSidebar() {
    sidebarOpen = true;
    sidebar.classList.add("open");
    sidebarOverlay.classList.add("active");
    hamburgerBtn.classList.add("active");
    document.body.style.overflow = 'hidden';
}

function closeSidebar() {
    sidebarOpen = false;
    sidebar.classList.remove("open");
    sidebarOverlay.classList.remove("active");
    hamburgerBtn.classList.remove("active");
    document.body.style.overflow = '';
}

function isMobile() { return window.innerWidth <= 768; }

/* ========== LOGIN ========== */
document.getElementById("adminForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    var username = document.getElementById("username").value.trim();
    var password = document.getElementById("password").value.trim();
    var errorMsg = document.getElementById("errorMsg");

    errorMsg.style.display = "block";
    errorMsg.style.color = "#666";
    errorMsg.textContent = "Authenticating...";

    try {
        var res = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: username, password: password })
        });
        var data = await res.json();

        if (res.ok && data.success) {
            sessionStorage.setItem('adminLoggedIn', 'true');
            showDashboard();
        } else {
            errorMsg.style.color = "red";
            errorMsg.textContent = data.message || "Login failed";
        }
    } catch(err) {
        errorMsg.style.color = "red";
        errorMsg.textContent = "Server error. Please try again.";
    }
});

function showDashboard() {
    loginContainer.style.display = "none";
    appContainer.style.display = "block";
    loadTables();
}

function logout() {
    sessionStorage.removeItem('adminLoggedIn');
    location.reload();
}

/* ==================== TABLES LIST ==================== */
async function loadTables() {
    var res = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/tables");
    var tables = await res.json();
    tablesDiv.innerHTML = "";

    tables.forEach(function(t) {
        var div = document.createElement("div");
        div.className = "table-item";
        div.textContent = t.replace(/_/g, ' ');
        div.setAttribute("data-table", t);
        div.onclick = function() {
            document.querySelectorAll('.table-item').forEach(function(i) { i.classList.remove('active'); });
            div.classList.add('active');
            loadTableData(t);
            if (isMobile()) { closeSidebar(); }
        };
        tablesDiv.appendChild(div);
    });
}

/* ==================== LOAD TABLE ==================== */
async function loadTableData(table) {
    currentTable = table;
    content.innerHTML = '<div class="empty">Loading data...</div>';

    var res = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/table/" + table);
    var rows = await res.json();

    if (!Array.isArray(rows) || rows.length === 0) {
        content.innerHTML = '<h3>' + table.replace(/_/g, ' ') + '</h3><div class="empty">No data available in this table.</div>';
        return;
    }

    currentRows = rows;
    currentCols = Object.keys(rows[0]);
    idField = currentCols[0];

    var html = '<h3>' + table.replace(/_/g, ' ') + '</h3>';

    /* ---------- ADD FORM ---------- */
    html += '<div class="form-box">';
    html += '<div class="form-box-header">';
    html += '<b>Add New Entry</b>';
    html += '<div class="form-header-line"></div>';
    html += '</div>';
    html += '<div class="form-box-body"><div class="form-grid">';

    currentCols.forEach(function(c) {
        if (c === idField) return;

        var isImage = c === "image_url" || c === "photo_url" || c.indexOf("image") !== -1 || c.indexOf("photo") !== -1;
        var isLong = c.indexOf("description") !== -1 || c.indexOf("message") !== -1 || c.indexOf("content") !== -1;
        var isFullWidth = isLong || isImage;

        html += '<div class="form-field' + (isFullWidth ? ' full-width' : '') + '">';
        html += '<label>' + c.replace(/_/g, ' ') + '</label>';

        if (isImage) {
            html += '<input type="file" id="new_' + c + '">';
        } else if (isLong) {
            html += '<textarea id="new_' + c + '" placeholder="' + c.replace(/_/g, ' ') + '" rows="3"></textarea>';
        } else {
            html += '<input type="text" id="new_' + c + '" placeholder="' + c.replace(/_/g, ' ') + '">';
        }

        html += '</div>';
    });

    html += '</div></div>';
    html += '<div class="form-box-footer">';
    html += '<button class="action-btn save" onclick="addRow()">Add Entry</button>';
    html += '</div>';
    html += '</div>';

    /* ---------- DATA TABLE ---------- */
    html += '<div class="table-wrapper"><table><thead><tr>';

    currentCols.forEach(function(c) {
        html += '<th>' + c.replace(/_/g, ' ') + '</th>';
    });

    html += '<th style="width:130px;text-align:center;">Actions</th></tr></thead><tbody>';

    rows.forEach(function(r, rowIndex) {
        html += '<tr data-row-index="' + rowIndex + '">';

        currentCols.forEach(function(c) {
            if (c === idField) {
                html += '<td><strong>' + (r[c] ?? "") + '</strong></td>';
            } else if (c === "image_url" || c === "photo_url" || c.indexOf("image") !== -1 || c.indexOf("photo") !== -1) {
                html += '<td data-col="' + c + '">';
                if (r[c]) html += '<img src="' + r[c] + '" class="preview-img" alt="preview">';
                html += '<input type="file" class="cell-file-input">';
                html += '</td>';
            } else {
                var displayText = r[c] ?? "";
                if (displayText.length > 80) displayText = displayText.substring(0, 80) + "...";
                html += '<td contenteditable="true" data-col="' + c + '">' + displayText + '</td>';
            }
        });

        html += '<td style="text-align:center;white-space:nowrap;">';
        html += '<button class="action-btn save" onclick="updateRow(' + rowIndex + ')">Save</button>';
        html += '<button class="action-btn delete" onclick="deleteRow(\'' + r[idField] + '\')">Delete</button>';
        html += '</td></tr>';
    });

    html += '</tbody></table></div>';

    content.innerHTML = html;
}

/* ==================== UPLOAD ==================== */
async function uploadImage(file) {
    var formData = new FormData();
    formData.append("image", file);

    var res = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/upload", {
        method: "POST",
        body: formData
    });

    var result = await res.json();
    if (!result.success) {
        alert("Image upload failed");
        throw new Error("Upload failed");
    }
    return result.url;
}

/* ==================== ADD ROW ==================== */
async function addRow() {
    var data = {};

    for (var i = 0; i < currentCols.length; i++) {
        var c = currentCols[i];
        if (c === idField) continue;

        if (c === "image_url" || c === "photo_url" || c.indexOf("image") !== -1 || c.indexOf("photo") !== -1) {
            var fileInput = document.getElementById("new_" + c);
            var file = fileInput ? fileInput.files[0] : null;
            data[c] = file ? await uploadImage(file) : "";
        } else {
            var el = document.getElementById("new_" + c);
            data[c] = el ? el.value : "";
        }
    }

    var res = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/table/" + currentTable, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    if (!res.ok) { alert("Insert failed."); return; }
    loadTableData(currentTable);
}

/* ==================== UPDATE ROW ==================== */
async function updateRow(rowIndex) {
    var row = currentRows[rowIndex];
    var id = row[idField];
    var tr = content.querySelector('tr[data-row-index="' + rowIndex + '"]');
    var data = {};
    var cells = tr.querySelectorAll("td[data-col]");

    for (var i = 0; i < cells.length; i++) {
        var td = cells[i];
        var col = td.dataset.col;

        if (col === "image_url" || col === "photo_url" || col.indexOf("image") !== -1 || col.indexOf("photo") !== -1) {
            var fileInput = td.querySelector("input[type=file]");
            var file = fileInput ? fileInput.files[0] : null;

            if (file) {
                var formData = new FormData();
                formData.append("image", file);
                var uploadRes = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/upload", {
                    method: "POST",
                    body: formData
                });
                var uploadData = await uploadRes.json();
                if (uploadData.success) {
                    data[col] = uploadData.url;
                } else {
                    alert("Image upload failed");
                    return;
                }
            } else {
                var img = td.querySelector("img");
                data[col] = img ? img.getAttribute("src") : "";
            }
        } else {
            data[col] = td.textContent.trim();
        }
    }

    var res = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/table/" + currentTable + "/" + idField + "/" + id, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    if (!res.ok) { alert("Update failed."); return; }
    loadTableData(currentTable);
}

/* ==================== DELETE ROW ==================== */
async function deleteRow(id) {
    if (!confirm("Are you sure you want to delete this record?")) return;

    var res = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/table/" + currentTable + "/" + idField + "/" + id, {
        method: "DELETE"
    });

    if (!res.ok) { alert("Delete failed."); return; }
    loadTableData(currentTable);
}

/* ========== RESIZE CLEANUP ========== */
window.addEventListener("resize", function() {
    if (!isMobile() && sidebarOpen) { closeSidebar(); }
});

window.addEventListener("popstate", function() {
    if (sidebarOpen) { closeSidebar(); }
});
</script>
