<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Anasal MEPFS Corp - Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #c4161c;
    --primary-dark: #9a1116;
    --dark: #1a1a1a;
    --dark-lighter: #2a2a2a;
    --light: #f5f5f5;
    --steel: #666666;
    --steel-light: #888888;
    --white: #ffffff;
    --sidebar-w: 250px;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Roboto', sans-serif;
    background: var(--dark);
    color: var(--dark);
    overflow-x: hidden;
}

/* ==================== LOGIN SCREEN ==================== */
.login-container {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--dark);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.login-box {
    width: 420px;
    max-width: 90%;
    background: var(--white);
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.login-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: var(--primary);
}

.login-header {
    background: var(--dark-lighter);
    padding: 35px 30px;
    text-align: center;
}

.login-header h2 {
    color: var(--white);
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    text-transform: uppercase;
}

.login-body { padding: 40px 35px; }

.login-body input {
    width: 100%;
    padding: 16px 18px;
    margin-bottom: 18px;
    border: 2px solid #e0e0e0;
    font-size: 14px;
    font-family: 'Roboto', sans-serif;
    transition: border-color 0.3s ease;
    background: var(--white);
}

.login-body input:focus {
    outline: none;
    border-color: var(--primary);
}

.login-body button {
    width: 100%;
    padding: 16px;
    background: var(--primary);
    border: none;
    color: var(--white);
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    font-size: 16px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: background 0.3s ease;
}

.login-body button:hover {
    background: var(--primary-dark);
}

#errorMsg {
    text-align: center;
    margin-top: 18px;
    font-size: 13px;
    padding: 12px;
    background: var(--light);
    color: var(--steel);
    display: none;
    border-radius: 2px;
}

/* ==================== DASHBOARD ==================== */
#appContainer {
    display: none;
    height: 100vh;
}

/* ---------- HEADER ---------- */
.header {
    background: var(--dark);
    color: var(--white);
    padding: 0 30px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    border-bottom: 4px solid var(--primary);
}

.header-left {
    display: flex;
    align-items: center;
    gap: 16px;
}

.header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.header-logo .logo-icon {
    width: 38px;
    height: 38px;
    background: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 18px;
    flex-shrink: 0;
}

.header-title {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 17px;
    line-height: 1.2;
}

.header-title span {
    color: var(--steel-light);
    font-size: 11px;
    display: block;
    letter-spacing: 0.1em;
    font-weight: 400;
}

.logout-btn {
    background: transparent;
    color: var(--white);
    border: 1px solid var(--primary);
    padding: 8px 20px;
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
    flex-shrink: 0;
}

.logout-btn:hover {
    background: var(--primary);
}

/* ---------- HAMBURGER ---------- */
.hamburger-btn {
    display: none;
    flex-direction: column;
    justify-content: space-between;
    width: 26px;
    height: 18px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    z-index: 300;
}

.hamburger-btn span {
    display: block;
    height: 2px;
    width: 100%;
    background-color: var(--white);
    border-radius: 2px;
    transition: all 0.3s ease;
}

.hamburger-btn.active span:nth-child(1) {
    transform: translateY(8px) rotate(45deg);
}

.hamburger-btn.active span:nth-child(2) {
    opacity: 0;
}

.hamburger-btn.active span:nth-child(3) {
    transform: translateY(-8px) rotate(-45deg);
}

/* ---------- SIDEBAR OVERLAY ---------- */
.sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 140;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.sidebar-overlay.visible {
    opacity: 1;
}

/* ---------- LAYOUT ---------- */
.container {
    display: flex;
    height: calc(100vh - 60px);
    margin-top: 60px;
}

/* ---------- SIDEBAR ---------- */
.sidebar {
    width: var(--sidebar-w);
    background: var(--dark-lighter);
    color: var(--white);
    overflow-y: auto;
    border-right: 1px solid #333;
    flex-shrink: 0;
    position: relative;
    z-index: 150;
    transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.sidebar h3 {
    font-family: 'Oswald', sans-serif;
    padding: 20px;
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 12px;
    color: var(--steel-light);
    border-bottom: 1px solid #444;
    background: var(--dark);
}

.table-item {
    padding: 14px 20px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 14px;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    color: #aaa;
}

.table-item::before {
    content: '';
    width: 3px;
    height: 0;
    background: var(--primary);
    transition: height 0.25s ease;
    position: absolute;
    left: 0;
    top: 0;
}

.table-item:hover {
    background: var(--dark);
    color: var(--white);
}

.table-item:hover::before {
    height: 100%;
}

.table-item.active {
    background: var(--primary);
    color: white;
}

.table-item.active::before {
    height: 100%;
    background: var(--primary-dark);
}

/* ---------- MAIN CONTENT ---------- */
.main {
    flex: 1;
    padding: 30px;
    overflow: auto;
    background: #eef0f2;
    min-width: 0;
}

.main h3 {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    margin-bottom: 24px;
    letter-spacing: 0.06em;
    color: var(--dark);
    border-left: 4px solid var(--primary);
    padding-left: 14px;
    font-size: 20px;
    font-weight: 500;
}

/* ---------- TABLE ---------- */
.table-wrapper {
    overflow-x: auto;
    border-radius: 4px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.06);
}

table {
    border-collapse: collapse;
    width: 100%;
    background: var(--white);
    min-width: 600px;
}

th, td {
    border: 1px solid #e0e0e0;
    padding: 12px 14px;
    font-size: 13px;
    vertical-align: middle;
}

th {
    background: var(--dark);
    color: var(--white);
    text-align: left;
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 0.06em;
    white-space: nowrap;
}

tr:nth-child(even) { background-color: #fafafa; }
tr:hover { background-color: #f4f4f4; }

.empty {
    color: var(--steel);
    margin-top: 50px;
    text-align: center;
    font-style: italic;
}

/* ---------- BUTTONS ---------- */
.action-btn {
    padding: 7px 14px;
    font-size: 11px;
    font-family: 'Oswald', sans-serif;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border: none;
    transition: all 0.2s ease;
    font-weight: 500;
    white-space: nowrap;
}

.action-btn.save {
    background: var(--primary);
    color: white;
    margin-right: 6px;
}

.action-btn.save:hover { background: var(--primary-dark); }

.action-btn.delete {
    background: transparent;
    color: var(--primary);
    border: 1px solid var(--primary);
}

.action-btn.delete:hover {
    background: var(--primary);
    color: white;
}

/* ---------- FORM BOX ---------- */
.form-box {
    background: var(--white);
    padding: 24px;
    margin-bottom: 24px;
    border-top: 3px solid var(--primary);
    box-shadow: 0 5px 20px rgba(0,0,0,0.06);
    border-radius: 0 0 4px 4px;
}

.form-box b {
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: block;
    color: var(--dark);
    letter-spacing: 0.04em;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
    margin-bottom: 18px;
}

.form-grid .full-width {
    grid-column: 1 / -1;
}

.form-box label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--steel);
    margin-bottom: 6px;
    font-weight: 500;
}

.form-box input[type="text"],
.form-box input[type="email"],
.form-box input[type="tel"],
.form-box input[type="number"],
.form-box textarea,
.form-box select {
    margin: 0;
    padding: 10px 14px;
    border: 1px solid #ddd;
    font-family: 'Roboto', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
    background: var(--white);
    border-radius: 2px;
}

.form-box input:focus,
.form-box textarea:focus,
.form-box select:focus {
    border-color: var(--primary);
    outline: none;
    box-shadow: 0 0 0 3px rgba(196, 22, 28, 0.1);
}

.form-box input[type="file"] {
    background: white;
    padding: 8px 4px;
    border: 1px dashed #ccc;
    cursor: pointer;
    border-radius: 2px;
}

.form-box textarea {
    resize: vertical;
    min-height: 80px;
}

.preview-img {
    max-width: 80px;
    max-height: 60px;
    display: block;
    margin-bottom: 6px;
    border: 1px solid #ddd;
    object-fit: cover;
    border-radius: 2px;
}

/* ---------- TABLE CELL EDITABLE ---------- */
td[contenteditable="true"] {
    cursor: text;
    transition: background 0.15s ease;
}

td[contenteditable="true"]:focus {
    outline: 2px solid var(--primary);
    outline-offset: -2px;
    background: #fff;
}

td .cell-file-input {
    font-size: 11px;
    margin-top: 4px;
}

/* ---------- SCROLLBAR ---------- */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--light); }
::-webkit-scrollbar-thumb { background: #bbb; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

/* ==================== RESPONSIVE ==================== */

@media (max-width: 768px) {
    .header {
        padding: 0 16px;
    }

    .hamburger-btn {
        display: flex;
    }

    .header-title {
        font-size: 15px;
    }

    .header-title span {
        display: none;
    }

    .logout-btn {
        padding: 6px 14px;
        font-size: 11px;
        letter-spacing: 0.5px;
    }

    /* Sidebar becomes a slide-out panel */
    .sidebar {
        position: fixed;
        top: 60px;
        left: 0;
        bottom: 0;
        width: var(--sidebar-w);
        transform: translateX(-100%);
        z-index: 150;
        box-shadow: none;
        transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.3s ease;
    }

    .sidebar.open {
        transform: translateX(0);
        box-shadow: 10px 0 40px rgba(0,0,0,0.5);
    }

    .sidebar-overlay.active {
        display: block;
    }

    .main {
        padding: 20px 16px;
    }

    .main h3 {
        font-size: 18px;
        margin-bottom: 18px;
    }

    .form-box {
        padding: 18px;
    }

    .form-grid {
        grid-template-columns: 1fr;
        gap: 12px;
    }

    .action-btn {
        padding: 6px 10px;
        font-size: 10px;
    }
}

@media (max-width: 480px) {
    .header-logo .logo-icon {
        width: 32px;
        height: 32px;
        font-size: 14px;
    }

    .header-title {
        font-size: 13px;
    }

    .logout-btn {
        padding: 5px 10px;
        font-size: 10px;
    }

    .main {
        padding: 16px 12px;
    }

    .form-box {
        padding: 14px;
    }

    .form-box b {
        font-size: 14px;
    }

    th, td {
        padding: 10px 10px;
        font-size: 12px;
    }
}
</style>
</head>
<body>

<!-- LOGIN CONTAINER -->
<div class="login-container" id="loginContainer">
    <div class="login-box">
        <div class="login-header">
            <h2>Admin Login</h2>
        </div>
        <div class="login-body">
            <form id="adminForm">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <div id="errorMsg"></div>
        </div>
    </div>
</div>

<!-- APP CONTAINER -->
<div id="appContainer">

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <button class="hamburger-btn" id="hamburgerBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="header-logo">
                <div class="logo-icon">AMC</div>
                <div class="header-title">
                    Anasal MEPFS
                    <span>Admin Dashboard</span>
                </div>
            </div>
        </div>
        <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>

    <!-- SIDEBAR OVERLAY -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- BODY -->
    <div class="container">

        <div class="sidebar" id="sidebar">
            <h3>Database Tables</h3>
            <div id="tables"></div>
        </div>

        <div class="main">
            <div id="content" class="empty">
                Select a table from the sidebar to manage data.
            </div>
        </div>

    </div>
</div>

<script>
const tablesDiv = document.getElementById("tables");
const content   = document.getElementById("content");
const loginContainer = document.getElementById("loginContainer");
const appContainer = document.getElementById("appContainer");
const sidebar = document.getElementById("sidebar");
const sidebarOverlay = document.getElementById("sidebarOverlay");
const hamburgerBtn = document.getElementById("hamburgerBtn");

let currentTable = "";
let idField = "";
let currentCols = [];
let currentRows = [];

// ========== SESSION CHECK ==========
if (sessionStorage.getItem('adminLoggedIn') === 'true') {
    showDashboard();
}

// ========== SIDEBAR TOGGLE ==========
hamburgerBtn.addEventListener("click", () => {
    const isOpen = sidebar.classList.contains("open");
    if (isOpen) {
        closeSidebar();
    } else {
        openSidebar();
    }
});

sidebarOverlay.addEventListener("click", () => {
    closeSidebar();
});

function openSidebar() {
    sidebar.classList.add("open");
    sidebarOverlay.classList.add("active");
    // Force reflow before adding visible for transition
    void sidebarOverlay.offsetWidth;
    sidebarOverlay.classList.add("visible");
    hamburgerBtn.classList.add("active");
}

function closeSidebar() {
    sidebar.classList.remove("open");
    sidebarOverlay.classList.remove("visible");
    hamburgerBtn.classList.remove("active");
    setTimeout(() => {
        sidebarOverlay.classList.remove("active");
    }, 300);
}

// ========== LOGIN ==========
document.getElementById("adminForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorMsg = document.getElementById("errorMsg");

    errorMsg.style.display = "block";
    errorMsg.style.color = "#666";
    errorMsg.textContent = "Authenticating...";

    try {
        const res = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok && data.success) {
            sessionStorage.setItem('adminLoggedIn', 'true');
            showDashboard();
        } else {
            errorMsg.style.color = "red";
            errorMsg.textContent = data.message || "Login failed";
        }
    } catch {
        errorMsg.style.color = "red";
        errorMsg.textContent = "Server error. Please try again.";
    }
});

function showDashboard() {
    loginContainer.style.display = "none";
    appContainer.style.display = "block";
    loadTables();
}

function logout() {
    sessionStorage.removeItem('adminLoggedIn');
    location.reload();
}

/* ==================== TABLES LIST ==================== */
async function loadTables() {
    const res = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/tables");
    const tables = await res.json();

    tablesDiv.innerHTML = "";

    tables.forEach(t => {
        const div = document.createElement("div");
        div.className = "table-item";
        div.textContent = t.replace(/_/g, ' ');
        div.setAttribute("data-table", t);
        div.onclick = () => {
            document.querySelectorAll('.table-item').forEach(i => i.classList.remove('active'));
            div.classList.add('active');
            loadTableData(t);
            // Auto-close sidebar on mobile after selection
            if (window.innerWidth <= 768) {
                closeSidebar();
            }
        };
        tablesDiv.appendChild(div);
    });
}

/* ==================== LOAD TABLE ==================== */
async function loadTableData(table) {

    currentTable = table;
    content.innerHTML = '<div class="empty">Loading data...</div>';

    const res = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/table/" + table);
    const rows = await res.json();

    if (!Array.isArray(rows) || rows.length === 0) {
        content.innerHTML = `<h3>${table.replace(/_/g, ' ')}</h3><div class='empty'>No data available in this table.</div>`;
        return;
    }

    currentRows = rows;
    currentCols = Object.keys(rows[0]);
    idField = currentCols[0];

    let html = `<h3>${table.replace(/_/g, ' ')}</h3>`;

    /* ---------- ADD FORM ---------- */
    html += `<div class="form-box"><b>Add New Entry</b><div class="form-grid">`;

    currentCols.forEach(c => {
        if (c === idField) return;

        const isImage = c === "image_url" || c === "photo_url" || c.includes("image") || c.includes("photo");
        const isLong = c.includes("description") || c.includes("message") || c.includes("content");
        const isFullWidth = isLong || isImage;

        html += `<div class="${isFullWidth ? 'full-width' : ''}">`;
        html += `<label>${c.replace(/_/g, ' ')}</label>`;

        if (isImage) {
            html += `<input type="file" id="new_${c}">`;
        } else if (isLong) {
            html += `<textarea id="new_${c}" placeholder="${c.replace(/_/g, ' ')}" rows="3"></textarea>`;
        } else {
            html += `<input type="text" id="new_${c}" placeholder="${c.replace(/_/g, ' ')}">`;
        }

        html += `</div>`;
    });

    html += `</div>`;
    html += `<button class="action-btn save" onclick="addRow()">Add Entry</button></div>`;

    /* ---------- DATA TABLE ---------- */
    html += `<div class="table-wrapper"><table><thead><tr>`;

    currentCols.forEach(c => {
        html += `<th>${c.replace(/_/g, ' ')}</th>`;
    });

    html += `<th style="width:140px; text-align:center;">Actions</th></tr></thead><tbody>`;

    rows.forEach((r, rowIndex) => {
        html += `<tr data-row-index="${rowIndex}">`;

        currentCols.forEach(c => {
            if (c === idField) {
                html += `<td><strong>${r[c] ?? ""}</strong></td>`;
            } else if (c === "image_url" || c === "photo_url" || c.includes("image") || c.includes("photo")) {
                html += `
                    <td data-col="${c}">
                        ${r[c] ? `<img src="${r[c]}" class="preview-img" alt="preview">` : ""}
                        <input type="file" class="cell-file-input">
                    </td>`;
            } else {
                let displayText = r[c] ?? "";
                if (displayText.length > 80) displayText = displayText.substring(0, 80) + "...";
                html += `<td contenteditable="true" data-col="${c}">${displayText}</td>`;
            }
        });

        html += `
            <td style="text-align:center; white-space:nowrap;">
                <button class="action-btn save" onclick="updateRow(${rowIndex})">Save</button>
                <button class="action-btn delete" onclick="deleteRow('${r[idField]}')">Delete</button>
            </td>`;

        html += `</tr>`;
    });

    html += `</tbody></table></div>`;

    content.innerHTML = html;
}

/* ==================== UPLOAD ==================== */
async function uploadImage(file) {
    const formData = new FormData();
    formData.append("image", file);

    const res = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/upload", {
        method: "POST",
        body: formData
    });

    const result = await res.json();

    if (!result.success) {
        alert("Image upload failed");
        throw new Error("Upload failed");
    }

    return result.url;
}

/* ==================== ADD ROW ==================== */
async function addRow() {
    const data = {};

    for (const c of currentCols) {
        if (c === idField) continue;

        if (c === "image_url" || c === "photo_url" || c.includes("image") || c.includes("photo")) {
            const file = document.getElementById("new_" + c).files[0];
            data[c] = file ? await uploadImage(file) : "";
        } else {
            data[c] = document.getElementById("new_" + c).value;
        }
    }

    const res = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/table/" + currentTable, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    if (!res.ok) {
        alert("Insert failed.");
        return;
    }

    loadTableData(currentTable);
}

/* ==================== UPDATE ROW ==================== */
async function updateRow(rowIndex) {
    const row = currentRows[rowIndex];
    const id = row[idField];
    const tr = content.querySelector(`tr[data-row-index="${rowIndex}"]`);
    const data = {};

    const cells = tr.querySelectorAll("td[data-col]");

    for (const td of cells) {
        const col = td.dataset.col;

        if (col === "image_url" || col === "photo_url" || col.includes("image") || col.includes("photo")) {
            const fileInput = td.querySelector("input[type=file]");
            const file = fileInput ? fileInput.files[0] : null;

            if (file) {
                const formData = new FormData();
                formData.append("image", file);

                const uploadRes = await fetch("https://anasal-mepfs-corporation.onrender.com/api/admin/upload", {
                    method: "POST",
                    body: formData
                });

                const uploadData = await uploadRes.json();

                if (uploadData.success) {
                    data[col] = uploadData.url;
                } else {
                    alert("Image upload failed");
                    return;
                }
            } else {
                const img = td.querySelector("img");
                data[col] = img ? img.getAttribute("src") : "";
            }
        } else {
            data[col] = td.textContent.trim();
        }
    }

    const res = await fetch(`https://anasal-mepfs-corporation.onrender.com/api/admin/table/${currentTable}/${idField}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    if (!res.ok) {
        alert("Update failed.");
        return;
    }

    loadTableData(currentTable);
}

/* ==================== DELETE ROW ==================== */
async function deleteRow(id) {
    if (!confirm("Are you sure you want to delete this record?")) return;

    const res = await fetch(`https://anasal-mepfs-corporation.onrender.com/api/admin/table/${currentTable}/${idField}/${id}`, {
        method: "DELETE"
    });

    if (!res.ok) {
        alert("Delete failed.");
        return;
    }

    loadTableData(currentTable);
}
